name: Migrations CI

on:
  push:
    branches: [main]
    paths:
      - "services/api/migrations/**"
  pull_request:
    branches: [main]
    paths:
      - "services/api/migrations/**"

permissions:
  contents: read

env:
  DATABASE_URL: "postgres://postgres:postgres@localhost:5432/skillisland_test?sslmode=disable"

jobs:
  validate:
    name: Validate Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skillisland_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -fsSL https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run up migrations
        run: |
          migrate -path services/api/migrations \
            -database "$DATABASE_URL" \
            up

      - name: Run down migrations
        run: |
          migrate -path services/api/migrations \
            -database "$DATABASE_URL" \
            down -all
